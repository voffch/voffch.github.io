<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./styles/w3.css">
	<link rel="stylesheet" href="./styles/tweaks.css">
    <script type="text/javascript" src="./scripts/chemCalc.js"></script>
    <script type="text/javascript" src="./scripts/chemCalcUI.js"></script>
    <title>ChemCalc</title>
</head>
<body>

    <article class="w3-row-padding w3-responsive">
        <div class="w3-col w3-hide-small w3-hide-middle l3">&nbsp;</div>
        <div class="w3-col s12 m12 l6 w3-light-grey">
            <h2 class="w3-panel w3-dark-grey w3-hover-black" onclick="toggleSectionDisplay('formula_container')">Molar Mass</h2>
            <div class="w3-animate-opacity" id="formula_container">
                <input type="text" class="w3-input w3-center w3-leftbar" id="formula_input" 
                        placeholder="e.g. H2O" onkeydown="formulaInputKeydown(event)" onblur="formulaInputBlur()">
                <label>Enter the chemical formula and press "Enter" or click elsewhere</label>
                <div class="w3-panel w3-center w3-large w3-hide" id="formula_output_text"></div>
                <div class="w3-panel w3-center w3-large w3-hide" id="formula_output_molar_mass"></div>
                <div class="w3-panel w3-stretch w3-hide" id="formula_output_calculator">
                    <div class="w3-col" style="width:45%">
                        <input class="w3-input" type="text" placeholder="Moles" oninput="formulaOutputCalculator(0)">
                        <label class="w3-right">mol</label>
                    </div>
                    <div class="w3-col" style="width:10%">&nbsp;</div>
                    <div class="w3-col" style="width:45%">
                        <input class="w3-input" type="text" placeholder="Grams" oninput="formulaOutputCalculator(1)">
                        <label class="w3-right">g</label>
                    </div>
                </div> 
                <div class="w3-panel w3-stretch">
                    <table class="w3-table-all w3-hide" id="formula_output_table">
                        <tr>
                            <th>element</th>
                            <th>moles</th>
                            <th>mol %</th>
                            <th>wt %</th>
                        </tr>
                    </table>
                </div>
            </div>
            <h2 class="w3-panel w3-dark-grey w3-hover-black" onclick="toggleSectionDisplay('equation_container')">Chemical Equation</h2>
            <div class="w3-animate-opacity" id="equation_container">
                <input type="text" class="w3-input w3-center w3-leftbar" id="equation_input" 
                        placeholder="e.g. H2 + O2 = H2O" onkeydown="equationInputKeydown(event)" onblur="equationInputBlur()">
                <label>Enter the chemical equation and press "Enter" or click elsewhere</label>
                <div class="w3-panel w3-center w3-large w3-hide" id="equation_output_text"></div>
                <div class="w3-panel w3-stretch">
                    <table class="w3-table-all w3-half w3-hide" id="equation_output_reagents">
                        <tr>
                            <th>#</th>
                            <th>reagent</th>
                            <th><i>M</i>,<br>g&#x00B7;mol<sup>-1</sup></th>
                            <th>wt, g</th>
                        </tr>
                    </table>
                    <table class="w3-table-all w3-half w3-hide" id="equation_output_products">
                        <tr>
                            <th>#</th>
                            <th>product</th>
                            <th><i>M</i>,<br>g&#x00B7;mol<sup>-1</sup></th>
                            <th>wt, g</th>
                        </tr>
                    </table>
                </div>
            </div class="w3-animate-opacity">
        </div>
        <div class="w3-col w3-hide-small w3-hide-middle l3">&nbsp;</div>
    </article> 

</body>
</html>
